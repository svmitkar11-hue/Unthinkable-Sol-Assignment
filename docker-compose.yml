# Full local stack: Postgres + Spring backend + React (nginx) frontend.
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up --build
# Frontend: http://localhost:5173   Backend: http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: society
      POSTGRES_USER: society
      POSTGRES_PASSWORD: society
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U society"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/society
      DB_USERNAME: society
      DB_PASSWORD: society
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-bytes-long}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@society.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SEED_DEMO: ${SEED_DEMO:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@society.com}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
