server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: society-maintenance-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/society}
    username: ${DB_USERNAME:society}
    password: ${DB_PASSWORD:society}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    email: ${ADMIN_EMAIL:admin@society.com}
    password: ${ADMIN_PASSWORD:admin123}
    name: ${ADMIN_NAME:Society Admin}
  mail:
    from: ${MAIL_FROM:no-reply@society.com}
    enabled: ${MAIL_ENABLED:false}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  storage:
    # Local fallback directory used when Cloudinary is not configured.
    local-dir: ${STORAGE_LOCAL_DIR:uploads}
  overdue:
    default-threshold-days: ${OVERDUE_THRESHOLD_DAYS:7}
    scan-rate-ms: ${OVERDUE_SCAN_RATE_MS:3600000}   # hourly
  otp:
    ttl-minutes: ${OTP_TTL_MINUTES:10}
  seed-demo: ${SEED_DEMO:false}

logging:
  level:
    org.springframework.security: WARN

---
# Zero-setup profile: in-memory H2, no Postgres/Docker required.
# Activate with SPRING_PROFILES_ACTIVE=h2
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:society;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

app:
  seed-demo: ${SEED_DEMO:true}
